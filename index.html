<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>贪吃蛇 | 经典街机风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(22, 30, 53, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 24px 28px 28px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(72, 187, 255, 0.2);
            transition: all 0.2s;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            background: #0f1424b3;
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .game-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #F9F3C1, #B9F3FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        .score-area {
            display: flex;
            gap: 24px;
            font-weight: 600;
        }

        .score-card, .best-card {
            background: #0105144d;
            padding: 5px 16px;
            border-radius: 32px;
            backdrop-filter: blur(4px);
            font-size: 1.1rem;
        }

        .score-card span:first-child, .best-card span:first-child {
            color: #a0b2d8;
            margin-right: 8px;
        }

        .score-card span:last-child, .best-card span:last-child {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .score-card span:last-child {
            color: #F5C542;
            text-shadow: 0 0 5px #ffb34740;
        }

        .best-card span:last-child {
            color: #6bc6ff;
        }

        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #0a1428;
            border-radius: 28px;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(8, 18, 40, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-radius: 28px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0s linear 0.3s;
            z-index: 20;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s ease, visibility 0s linear 0s;
        }

        .overlay h2 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(120deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .overlay p {
            font-size: 1.2rem;
            color: #c3d7ff;
            background: #00000066;
            padding: 5px 20px;
            border-radius: 40px;
        }

        .btn-glow {
            background: linear-gradient(95deg, #ff4d6d, #e63e6b);
            border: none;
            padding: 12px 34px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 80px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 5px 15px #e63e6b40;
        }

        .btn-glow:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px #e63e6b80;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 22px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .key-hint {
            background: #03071280;
            padding: 6px 15px;
            border-radius: 48px;
            color: #b9ceff;
            font-size: 0.8rem;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        .key-hint kbd {
            background: #1e2a4e;
            border-radius: 10px;
            padding: 4px 12px;
            font-weight: 700;
            margin: 0 4px;
            color: #f0f3ff;
            font-size: 0.75rem;
            box-shadow: inset 0 1px 0 #5f7fbf, 0 1px 2px black;
        }

        .restart-btn {
            background: #2f3b66;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #eef5ff;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 3px 5px #00000030;
        }

        .restart-btn:active {
            transform: scale(0.96);
            background: #1f2a4a;
        }

        @media (max-width: 520px) {
            .game-container {
                padding: 16px 18px 20px;
            }
            .score-card span:last-child, .best-card span:last-child {
                font-size: 1.2rem;
            }
            .game-title {
                font-size: 1.1rem;
            }
            .key-hint kbd {
                padding: 2px 8px;
            }
            .overlay h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="game-title">
            🐍 SNAKE · 贪食蛇
        </div>
        <div class="score-area">
            <div class="score-card">🍎 得分 <span id="currentScore">0</span></div>
            <div class="best-card">🏆 最高 <span id="highScore">0</span></div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="snakeCanvas" width="500" height="500"></canvas>
        <div class="overlay" id="gameOverlay">
            <h2 id="overlayTitle">GAME OVER</h2>
            <p>🐍 本次得分 · <span id="finalScore">0</span></p>
            <button class="btn-glow" id="overlayRestartBtn">⟳ 再来一局</button>
        </div>
    </div>

    <div class="action-bar">
        <div class="key-hint">
            🎮 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> &nbsp;|&nbsp;
            <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
        </div>
        <button class="restart-btn" id="restartButton">🔄 新的一局</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 游戏配置 ----------
        const BOARD_SIZE = 20;
        const CELL_SIZE = 500 / BOARD_SIZE;
        const TICK_INTERVAL_MS = 140;

        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('currentScore');
        const highScoreSpan = document.getElementById('highScore');
        const overlayDiv = document.getElementById('gameOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const finalScoreSpan = document.getElementById('finalScore');
        const overlayRestartBtn = document.getElementById('overlayRestartBtn');
        const restartBtn = document.getElementById('restartButton');

        let snake = [];
        let direction = [1, 0];
        let nextDirection = [1, 0];
        let food = { x: 12, y: 12 };
        let score = 0;
        let bestScore = 0;
        let gameRunning = true;
        let isWin = false;
        let gameLoopInterval = null;
        let gameEndFlag = false;

        // ---------- 本地存储 ----------
        function loadBestScore() {
            const stored = localStorage.getItem('snakeNeoBest');
            if (stored !== null && !isNaN(parseInt(stored, 10))) {
                bestScore = parseInt(stored, 10);
            } else {
                bestScore = 0;
            }
            highScoreSpan.textContent = bestScore;
        }

        function updateBestScoreUI() {
            if (score > bestScore) {
                bestScore = score;
                highScoreSpan.textContent = bestScore;
                localStorage.setItem('snakeNeoBest', bestScore);
            }
        }

        // ---------- 食物生成 ----------
        function generateRandomFood() {
            const totalCells = BOARD_SIZE * BOARD_SIZE;
            if (snake.length >= totalCells) {
                isWin = true;
                endGame(true);
                return null;
            }

            const occupiedSet = new Set(snake.map(seg => `${seg[0]},${seg[1]}`));
            if (occupiedSet.size === totalCells) {
                isWin = true;
                endGame(true);
                return null;
            }

            let freeCells = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (!occupiedSet.has(`${i},${j}`)) {
                        freeCells.push([i, j]);
                    }
                }
            }
            if (freeCells.length === 0) {
                isWin = true;
                endGame(true);
                return null;
            }
            const randomIndex = Math.floor(Math.random() * freeCells.length);
            const [fx, fy] = freeCells[randomIndex];
            return { x: fx, y: fy };
        }

        // ---------- 游戏重置 ----------
        function resetGame() {
            if (gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }

            gameRunning = true;
            gameEndFlag = false;
            isWin = false;
            score = 0;
            scoreSpan.textContent = "0";

            snake = [
                [10, 10],
                [9, 10],
                [8, 10]
            ];
            direction = [1, 0];
            nextDirection = [1, 0];

            const initialFood = generateRandomFood();
            if (initialFood) {
                food = initialFood;
            } else {
                food = { x: 15, y: 15 };
                if (snake.some(seg => seg[0] === food.x && seg[1] === food.y)) {
                    for (let i = 0; i < BOARD_SIZE; i++) {
                        let found = false;
                        for (let j = 0; j < BOARD_SIZE; j++) {
                            if (!snake.some(seg => seg[0] === i && seg[1] === j)) {
                                food = { x: i, y: j };
                                found = true;
                                break;
                            }
                        }
                        if (found) break;
                    }
                }
            }

            overlayDiv.classList.remove('show');
            drawCanvas();
            startGameLoop();
        }

        // ---------- 游戏结束 ----------
        function endGame(victory = false) {
            if (!gameRunning) return;
            gameRunning = false;
            gameEndFlag = true;

            if (gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }

            updateBestScoreUI();

            if (victory) {
                overlayTitle.innerHTML = '✨ 完美通关 ✨';
                overlayTitle.style.background = "linear-gradient(120deg, #FFE484, #FFB347)";
                overlayTitle.style.webkitBackgroundClip = "text";
                overlayTitle.style.backgroundClip = "text";
            } else {
                overlayTitle.innerHTML = '💀 游戏终结 💀';
                overlayTitle.style.background = "linear-gradient(120deg, #FFA6B0, #FF4D6D)";
                overlayTitle.style.webkitBackgroundClip = "text";
                overlayTitle.style.backgroundClip = "text";
            }
            finalScoreSpan.textContent = score;
            overlayDiv.classList.add('show');
            drawCanvas();
        }

        // ---------- 核心移动 ----------
        function moveSnake() {
            if (!gameRunning) return false;

            direction = [...nextDirection];
            const head = snake[0];
            const newHeadX = head[0] + direction[0];
            const newHeadY = head[1] + direction[1];

            if (newHeadX < 0 || newHeadX >= BOARD_SIZE || newHeadY < 0 || newHeadY >= BOARD_SIZE) {
                endGame(false);
                return false;
            }

            const willEat = (newHeadX === food.x && newHeadY === food.y);

            snake.unshift([newHeadX, newHeadY]);
            if (!willEat) {
                snake.pop();
            }

            const headPos = snake[0];
            const selfCollision = snake.slice(1).some(segment => segment[0] === headPos[0] && segment[1] === headPos[1]);
            if (selfCollision) {
                endGame(false);
                return false;
            }

            if (willEat) {
                score++;
                scoreSpan.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    highScoreSpan.textContent = bestScore;
                    localStorage.setItem('snakeNeoBest', bestScore);
                }

                const newFood = generateRandomFood();
                if (newFood === null) {
                    return false;
                } else {
                    food = newFood;
                }

                if (snake.length === BOARD_SIZE * BOARD_SIZE) {
                    isWin = true;
                    endGame(true);
                    return false;
                }
            }
            return true;
        }

        // ---------- 绘制 ----------
        function drawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(70, 130, 200, 0.35)";
            ctx.lineWidth = 1.2;
            for (let i = 0; i <= BOARD_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            if (food && !isWin) {
                const fx = food.x * CELL_SIZE;
                const fy = food.y * CELL_SIZE;
                ctx.shadowColor = "#ff5555";
                ctx.shadowBlur = 12;
                ctx.fillStyle = "#FF3B5C";
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE * 0.38, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#FFD966";
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#FFF5CF";
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE*0.65, fy + CELL_SIZE*0.35, CELL_SIZE*0.07, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < snake.length; i++) {
                const [sx, sy] = snake[i];
                const xPos = sx * CELL_SIZE;
                const yPos = sy * CELL_SIZE;
                const ratio = i / Math.max(snake.length - 1, 1);

                let gradient = ctx.createLinearGradient(xPos, yPos, xPos + CELL_SIZE, yPos + CELL_SIZE);
                if (i === 0) {
                    gradient.addColorStop(0, "#ff6a4b");
                    gradient.addColorStop(1, "#e63e2e");
                } else {
                    gradient.addColorStop(0, "#3dc2d0");
                    gradient.addColorStop(1, "#2596be");
                }
                ctx.fillStyle = gradient;
                ctx.shadowBlur = i === 0 ? 6 : 2;
                ctx.shadowColor = i === 0 ? "#ff8050" : "#2cc0a0";
                const padding = i === 0 ? 1.5 : 2.2;
                const radius = (CELL_SIZE - padding) * 0.25;
                ctx.beginPath();
                ctx.roundRect(xPos + padding/2, yPos + padding/2, CELL_SIZE - padding, CELL_SIZE - padding, radius);
                ctx.fill();

                // 蛇头眼睛
                if (i === 0 && gameRunning) {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.shadowBlur = 0;
                    if (direction[0] === 1) {
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 6, yPos + 8, 3, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 6, yPos + CELL_SIZE - 8, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#011627"; ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 5, yPos + 7, 1.4, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 5, yPos + CELL_SIZE - 9, 1.4, 0, Math.PI*2); ctx.fill();
                    } else if (direction[0] === -1) {
                        ctx.beginPath(); ctx.arc(xPos + 6, yPos + 8, 3, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + 6, yPos + CELL_SIZE - 8, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#011627"; ctx.beginPath(); ctx.arc(xPos + 5, yPos + 7, 1.4, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + 5, yPos + CELL_SIZE - 9, 1.4, 0, Math.PI*2); ctx.fill();
                    } else if (direction[1] === -1) {
                        ctx.beginPath(); ctx.arc(xPos + 8, yPos + 6, 3, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 8, yPos + 6, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#011627"; ctx.beginPath(); ctx.arc(xPos + 7, yPos + 5, 1.4, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 9, yPos + 5, 1.4, 0, Math.PI*2); ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(xPos + 8, yPos + CELL_SIZE - 6, 3, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 8, yPos + CELL_SIZE - 6, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#011627"; ctx.beginPath(); ctx.arc(xPos + 7, yPos + CELL_SIZE - 7, 1.4, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(xPos + CELL_SIZE - 9, yPos + CELL_SIZE - 7, 1.4, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.fillStyle = "#ffffff";
                } else if (i === 0 && !gameRunning) {
                    ctx.fillStyle = "#f5f9ff";
                    ctx.beginPath(); ctx.arc(xPos + CELL_SIZE*0.3, yPos + CELL_SIZE*0.4, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(xPos + CELL_SIZE*0.7, yPos + CELL_SIZE*0.4, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#AD1F3F";
                    ctx.beginPath(); ctx.moveTo(xPos+CELL_SIZE*0.4, yPos+CELL_SIZE*0.7);
                    ctx.lineTo(xPos+CELL_SIZE*0.6, yPos+CELL_SIZE*0.7);
                    ctx.lineTo(xPos+CELL_SIZE*0.5, yPos+CELL_SIZE*0.85);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;

            ctx.strokeStyle = "#58c4ff30";
            ctx.lineWidth = 2;
            ctx.strokeRect(2, 2, canvas.width-4, canvas.height-4);
        }

        // ---------- 游戏循环 ----------
        function gameTick() {
            if (!gameRunning) return;
            const success = moveSnake();
            drawCanvas();
            if (!success) return;
            if (!gameRunning) return;
        }

        function startGameLoop() {
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(() => gameTick(), TICK_INTERVAL_MS);
        }

        // ---------- 方向控制 ----------
        function setDirection(dx, dy) {
            if (!gameRunning) return;
            if ((dx === -direction[0] && dy === -direction[1])) return;
            if (dx === direction[0] && dy === direction[1]) return;
            nextDirection = [dx, dy];
        }

        // ---------- 事件 ----------
        function handleKeydown(e) {
            const key = e.key;
            const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D', ' ', 'Space'];
            if (arrowKeys.includes(key)) {
                e.preventDefault();
            }
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                resetGame();
                return;
            }

            switch (key) {
                case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
                default: break;
            }
        }

        let touchStart = { x: 0, y: 0 };
        function onTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStart.x = touch.clientX - rect.left;
            touchStart.y = touch.clientY - rect.top;
        }

        function onTouchEnd(e) {
            if (!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchEnd = e.changedTouches[0];
            const endX = touchEnd.clientX - rect.left;
            const endY = touchEnd.clientY - rect.top;
            const dx = endX - touchStart.x;
            const dy = endY - touchStart.y;
            if (Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) setDirection(1, 0);
                else setDirection(-1, 0);
            } else {
                if (dy > 0) setDirection(0, 1);
                else setDirection(0, -1);
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x-r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        // ---------- 启动 ----------
        window.addEventListener('load', () => {
            loadBestScore();
            resetGame();
            document.addEventListener('keydown', handleKeydown);
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd, { passive: false });
            restartBtn.addEventListener('click', () => resetGame());
            overlayRestartBtn.addEventListener('click', () => resetGame());
        });
    })();
</script>
</body>
</html>
